redirectsOrigin = "inline"
headersOrigin = "inline"

[images]
remote_images = [
  "^(?:https:\\/\\/images\\.unsplash\\.com(?:\\/(?!\\.)(?:(?:(?!(?:^|\\/)\\.).)*?)|$))$"
]

[functions]

  [functions."*"]

[[plugins]]
origin = "default"
package = "@netlify/plugin-nextjs"

  [plugins.inputs]

[build]
publish = "/Users/cly/Desktop/dasvio-web 4/out"
publishOrigin = "config"
commandOrigin = "config"
command = "node ./node_modules/next/dist/bin/next build --webpack"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[headers]]
for = "/_next/static/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/"
to = "/tr"
status = 302
force = false

  [redirects.query]

  [redirects.conditions]
  Language = [
    "tr"
  ]

  [redirects.headers]

[[redirects]]
from = "/"
to = "/en"
status = 302
force = false

  [redirects.query]

  [redirects.conditions]
  Language = [
    "en"
  ]

  [redirects.headers]

[[redirects]]
from = "/"
to = "/tr"
status = 302
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]

[[redirects]]
from = "/_next/image"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200
force = false

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

  [redirects.conditions]

  [redirects.headers]

[[redirects]]
from = "/_ipx/*"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200
force = false

  [redirects.query]
  url = ":url"
  w = ":width"
  q = ":quality"

  [redirects.conditions]

  [redirects.headers]